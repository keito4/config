name: Auto Update Libraries

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

# npm devDependencies, GitHub Actions, and Docker base images are owned by Dependabot
# (.github/dependabot.yml). This workflow only refreshes npm/global.json, which Dependabot
# cannot parse because it is a custom manifest. See docs/adr/0006-consolidate-version-updates.md.

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: ./.github/actions/setup-node-ci

      - name: Refresh global CLI manifest
        run: npm run update:libs

      - name: Generate update summary
        id: summary
        run: |
          {
            echo "summary<<EOF"
            if git diff --quiet npm/global.json; then
              echo "No updates available"
            else
              echo "## Updated Packages"
              echo ""
              echo "### Global CLI Packages (npm/global.json)"
              echo '```diff'
              git diff npm/global.json | grep -E '^\+.*"version":|^-.*"version":' || echo "No version changes"
              echo '```'
            fi
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: fix/auto-library-update
          delete-branch: true
          commit-message: 'fix: automated global CLI manifest refresh'
          title: 'fix: automated global CLI manifest refresh'
          body: |
            Automated update generated by `npm run update:libs`.

            ${{ steps.summary.outputs.summary }}

            ---

            **Scope:** `npm/global.json` only. npm devDependencies, GitHub Actions, and Docker base images are managed by Dependabot.

            **Auto-generated by:** [update-libraries.yml](.github/workflows/update-libraries.yml)
          labels: dependencies
