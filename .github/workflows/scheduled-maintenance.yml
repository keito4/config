name: Scheduled Maintenance

on:
  schedule:
    # Every Monday 06:00 UTC (JST 15:00)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Maintenance mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - check-only

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLAUDE_BRANCH: maintenance/${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Validate maintenance token
        env:
          CLAUDE_PR_GITHUB_TOKEN: ${{ secrets.CLAUDE_PR_GITHUB_TOKEN || secrets.CLAUDE_PAT }}
        run: |
          if [ -z "$CLAUDE_PR_GITHUB_TOKEN" ]; then
            echo "CLAUDE_PR_GITHUB_TOKEN or CLAUDE_PAT is required for scheduled maintenance because it may update workflow files."
            exit 1
          fi

      - name: Validate TAKT authentication
        env:
          TAKT_ANTHROPIC_API_KEY: ${{ secrets.TAKT_ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$TAKT_ANTHROPIC_API_KEY" ]; then
            echo "TAKT_ANTHROPIC_API_KEY or ANTHROPIC_API_KEY is required for scheduled TAKT maintenance."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1
          persist-credentials: false
          token: ${{ github.token }}

      # This managed config-repository workflow depends on .takt/**,
      # script/repo-maintenance.sh, script/run-takt-repo-maintenance.sh,
      # script/check-trivyignore-review.sh, and the setup-node-ci action.
      - name: Setup Node.js
        uses: ./.github/actions/setup-node-ci

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Prepare maintenance branch
        run: git checkout -b "$CLAUDE_BRANCH"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Review Trivy ignore entries
        run: script/check-trivyignore-review.sh

      - name: Write TAKT maintenance context
        env:
          REPO_MAINTENANCE_MODE: ${{ inputs.mode || 'full' }}
        run: |
          mkdir -p .context
          printf '%s\n' "$REPO_MAINTENANCE_MODE" > .context/takt-maintenance-mode

      - name: Run scheduled maintenance with TAKT
        id: maintenance
        env:
          REPO_MAINTENANCE_MODE: ${{ inputs.mode || 'full' }}
          TAKT_ANTHROPIC_API_KEY: ${{ secrets.TAKT_ANTHROPIC_API_KEY || secrets.ANTHROPIC_API_KEY }}
        run: |
          ./node_modules/.bin/takt --pipeline \
            --skip-git \
            --quiet \
            --workflow .takt/workflows/repo-maintenance.yml \
            --task "Run scheduled repository maintenance in ${REPO_MAINTENANCE_MODE} mode."

      - name: Create maintenance pull request
        if: env.CLAUDE_BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PR_GITHUB_TOKEN || secrets.CLAUDE_PAT }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          MODE: ${{ inputs.mode || 'full' }}
        run: |
          if [ -z "$CLAUDE_BRANCH" ]; then
            echo "Maintenance branch is empty. Skipping PR creation."
            exit 0
          fi

          git add -A -- . ':!.context'
          if git diff --cached --quiet; then
            echo "No committable maintenance changes. Skipping PR creation."
            exit 0
          fi

          git commit -m "chore: scheduled maintenance"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer $GH_TOKEN" push -u origin "$CLAUDE_BRANCH"

          EXISTING_PR=$(gh pr list --head "$CLAUDE_BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for $CLAUDE_BRANCH."
            exit 0
          fi

          BODY=$(printf "Automated scheduled maintenance run.\n\nMode: %s\nBranch: \`%s\`" "$MODE" "$CLAUDE_BRANCH")

          gh pr create \
            --head "$CLAUDE_BRANCH" \
            --base "$DEFAULT_BRANCH" \
            --title "chore: scheduled maintenance" \
            --body "$BODY"

      - name: Post failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          LABEL_ARGS=()
          if gh label list --json name --jq '.[].name' | grep -Fxq "maintenance"; then
            LABEL_ARGS=(--label "maintenance")
          fi

          EXISTING=$(gh issue list --state open --search "fix: Scheduled Maintenance failed in:title" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open maintenance issue already exists. Skipping."
            exit 0
          fi

          gh issue create \
            --title "fix: Scheduled Maintenance failed" \
            "${LABEL_ARGS[@]}" \
            --body "## Scheduled Maintenance Failure

          The scheduled maintenance workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Mode:** ${{ inputs.mode || 'full' }}

          Please check the workflow logs and re-run manually if needed.
          If this failed during token validation, configure \`CLAUDE_PR_GITHUB_TOKEN\` or \`CLAUDE_PAT\` in repository Actions secrets.
          If this failed with \`Invalid API key\`, rotate \`TAKT_ANTHROPIC_API_KEY\` or remove it so the workflow can use \`ANTHROPIC_API_KEY\`.

          ---
          *Auto-generated by [scheduled-maintenance.yml](.github/workflows/scheduled-maintenance.yml)*"
