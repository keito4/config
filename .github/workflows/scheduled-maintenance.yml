name: Scheduled Maintenance

on:
  schedule:
    # Every Monday 06:00 UTC (JST 15:00)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Maintenance mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - check-only

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLAUDE_BRANCH: maintenance/${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Validate maintenance token
        env:
          CLAUDE_PR_GITHUB_TOKEN: ${{ secrets.CLAUDE_PR_GITHUB_TOKEN || secrets.CLAUDE_PAT }}
        run: |
          if [ -z "$CLAUDE_PR_GITHUB_TOKEN" ]; then
            echo "CLAUDE_PR_GITHUB_TOKEN or CLAUDE_PAT is required for scheduled maintenance because it may update workflow files."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          token: ${{ secrets.CLAUDE_PR_GITHUB_TOKEN || secrets.CLAUDE_PAT }}

      - name: Prepare maintenance branch
        run: git checkout -b "$CLAUDE_BRANCH"

      - name: Review Trivy ignore entries
        run: script/check-trivyignore-review.sh

      - name: Run scheduled maintenance
        id: maintenance
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a # v1
        env:
          CLAUDE_BRANCH: ${{ env.CLAUDE_BRANCH }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.CLAUDE_PR_GITHUB_TOKEN || secrets.CLAUDE_PAT }}
          prompt: |
            Run `script/check-trivyignore-review.sh` first and include any due `.trivyignore` entries in the final summary.

            /repo-maintenance --mode ${{ inputs.mode || 'full' }} --create-pr

            Use branch `${{ env.CLAUDE_BRANCH }}` for maintenance commits and pushes.

            After completing maintenance, summarize:
            - What was checked
            - What was updated
            - What needs manual attention

            If `script/repo-maintenance.sh --create-pr` creates a pull request, do not create another one.
            If the script only pushes the branch, this workflow creates the pull request from the Claude branch after Claude finishes.

            If no updates are needed, do NOT create an issue.
          claude_args: |
            --allowedTools "Bash(gh api:*),Bash(gh repo view:*),Bash(gh issue create:*),Bash(gh issue list:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr checks:*),Bash(gh run view:*),Bash(npm:*),Bash(pnpm:*),Bash(npx:*),Bash(node:*),Bash(git:*),Bash(curl:*),Bash(jq:*),Bash(script/check-trivyignore-review.sh:*)"

      - name: Create maintenance pull request
        if: env.CLAUDE_BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PR_GITHUB_TOKEN || secrets.CLAUDE_PAT }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          MODE: ${{ inputs.mode || 'full' }}
        run: |
          if [ -z "$CLAUDE_BRANCH" ]; then
            echo "Claude did not create a branch. Skipping PR creation."
            exit 0
          fi

          if ! git ls-remote --exit-code --heads origin "$CLAUDE_BRANCH" >/dev/null; then
            echo "Claude branch $CLAUDE_BRANCH was not pushed. Skipping PR creation."
            exit 0
          fi

          EXISTING_PR=$(gh pr list --head "$CLAUDE_BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for $CLAUDE_BRANCH."
            exit 0
          fi

          BODY=$(printf "Automated scheduled maintenance run.\n\nMode: %s\nBranch: \`%s\`" "$MODE" "$CLAUDE_BRANCH")

          gh pr create \
            --head "$CLAUDE_BRANCH" \
            --base "$DEFAULT_BRANCH" \
            --title "chore: scheduled maintenance" \
            --body "$BODY"

      - name: Post failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          EXISTING=$(gh issue list --label "maintenance" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open maintenance issue already exists. Skipping."
            exit 0
          fi

          gh issue create \
            --title "fix: Scheduled Maintenance failed" \
            --label "maintenance,bug" \
            --body "## Scheduled Maintenance Failure

          The scheduled maintenance workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Mode:** ${{ inputs.mode || 'full' }}

          Please check the workflow logs and re-run manually if needed.
          If this failed during token validation, configure \`CLAUDE_PR_GITHUB_TOKEN\` or \`CLAUDE_PAT\` in repository Actions secrets.

          ---
          *Auto-generated by [scheduled-maintenance.yml](.github/workflows/scheduled-maintenance.yml)*"
