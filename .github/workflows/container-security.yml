name: Container Security Scan

on:
  push:
    branches: [main, pre-production, production]
    paths:
      - '.devcontainer/**'
      - 'npm/global.json'
  pull_request:
    branches: [main, pre-production, production]
    paths:
      - '.devcontainer/**'
      - 'npm/global.json'
  schedule:
    - cron: '0 5 * * 2'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Free disk space before scan
        run: |
          echo "=== Disk space before cleanup ==="
          df -h

          docker system prune -af --volumes
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true

          echo "=== Disk space after cleanup ==="
          df -h

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-docker-build
        with:
          qemu: 'false'
          login: 'false'

      - name: Build image for scanning
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          load: true
          tags: config-base:scan
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/config-base:cache

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          image-ref: 'config-base:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          vuln-type: 'os,library'
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Summarize Trivy results and fail on critical vulnerabilities
        if: always()
        run: |
          if [ ! -s trivy-results.sarif ]; then
            echo "::warning::trivy-results.sarif was not generated"
            exit 0
          fi

          count_by_severity() {
            local min=$1
            local max=$2
            jq --argjson min "$min" --argjson max "$max" '
              [
                .runs[] as $run
                | (
                    $run.tool.driver.rules // []
                    | map({key: .id, value: (.properties."security-severity" // "0")})
                    | from_entries
                  ) as $severities
                | ($run.results // [])[]
                | (.ruleId // "") as $rule_id
                | ($severities[$rule_id] // "0" | tostring | tonumber) as $score
                | select($score >= $min and $score < $max)
              ]
              | length
            ' trivy-results.sarif
          }

          CRITICAL_COUNT=$(count_by_severity 9 100)
          HIGH_COUNT=$(count_by_severity 7 9)
          MEDIUM_COUNT=$(count_by_severity 4 7)

          {
            echo "### Trivy Container Scan"
            echo ""
            echo "| Severity | Count |"
            echo "| --- | ---: |"
            echo "| Critical | $CRITICAL_COUNT |"
            echo "| High | $HIGH_COUNT |"
            echo "| Medium | $MEDIUM_COUNT |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::Trivy found $CRITICAL_COUNT critical vulnerabilities"
            exit 1
          fi

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: read

    steps:
      - name: Free disk space before SBOM generation
        run: |
          echo "=== Disk space before cleanup ==="
          df -h

          docker system prune -af --volumes
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true

          echo "=== Disk space after cleanup ==="
          df -h

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: ./.github/actions/setup-docker-build
        with:
          qemu: 'false'
          login: 'false'

      - name: Build image for SBOM
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: false
          load: true
          tags: config-base:sbom
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/config-base:cache

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: config-base:sbom
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30
