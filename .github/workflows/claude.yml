name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

permissions: {}

concurrency:
  # イベント種別 + トリガーのコメント/レビューIDを含めることで、
  # 同一 PR/Issue 内でも異なるメンションが互いをキャンセルしない
  group: >-
    claude-${{ github.repository }}-${{
      github.event.issue.number
      || github.event.pull_request.number
      || github.run_id
    }}-${{
      github.event.comment.id
      || github.event.review.id
      || github.run_id
    }}
  cancel-in-progress: false

jobs:
  claude:
    # Bot 全般を除外（sender.type で判定するため、Bot 名のハードコードが不要）
    if: |
      github.event.sender.type != 'Bot' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '@claude') &&
          !(github.event.issue.pull_request && github.event.issue.pull_request.url && github.event.issue.draft == true)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body || '', '@claude') &&
          github.event.pull_request.draft == false) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body || '', '@claude') &&
          github.event.pull_request.draft == false) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body || '', '@claude') || contains(github.event.issue.title || '', '@claude')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
      checks: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
            checks: read

          # System prompt to automatically create PRs when working on Issues
          claude_args: |
            --allowedTools "Bash(npm:*),Bash(pnpm:*),Bash(npx:*)"
            --system-prompt "When working on GitHub Issues (not PRs), after completing all code changes, commit and push the changes to the Claude branch. Do not run 'gh pr create'; this workflow creates the pull request from the branch after Claude finishes."

      - name: Create pull request from Claude branch
        if: >-
          steps.claude.outputs.branch_name != '' &&
          (
            github.event_name == 'issues' ||
            (github.event_name == 'issue_comment' && !github.event.issue.pull_request)
          )
        env:
          GH_TOKEN: ${{ steps.claude.outputs.github_token || github.token }}
          CLAUDE_BRANCH: ${{ steps.claude.outputs.branch_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          if [ -z "$CLAUDE_BRANCH" ]; then
            echo "Claude did not create a branch. Skipping PR creation."
            exit 0
          fi

          EXISTING_PR=$(gh pr list --head "$CLAUDE_BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for $CLAUDE_BRANCH."
            exit 0
          fi

          TITLE="$ISSUE_TITLE"
          if [ -z "$TITLE" ]; then
            TITLE="Claude changes for issue #$ISSUE_NUMBER"
          fi

          BODY=$(printf "Closes #%s\n\nCreated automatically from Claude Code branch \`%s\`." "$ISSUE_NUMBER" "$CLAUDE_BRANCH")

          gh pr create \
            --head "$CLAUDE_BRANCH" \
            --base "$DEFAULT_BRANCH" \
            --title "$TITLE" \
            --body "$BODY"
