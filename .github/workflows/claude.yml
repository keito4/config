name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

permissions: {}

concurrency:
  # イベント種別 + トリガーのコメント/レビューIDを含めることで、
  # 同一 PR/Issue 内でも異なるメンションが互いをキャンセルしない
  group: >-
    claude-${{ github.repository }}-${{
      github.event.issue.number
      || github.event.pull_request.number
      || github.run_id
    }}-${{
      github.event.comment.id
      || github.event.review.id
      || github.run_id
    }}
  cancel-in-progress: false

jobs:
  claude:
    # Bot 全般を除外（sender.type で判定するため、Bot 名のハードコードが不要）
    if: |
      github.event.sender.type != 'Bot' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body || '', '@claude') &&
          !(github.event.issue.pull_request && github.event.issue.pull_request.url && github.event.issue.draft == true)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body || '', '@claude') &&
          github.event.pull_request.draft == false) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body || '', '@claude') &&
          github.event.pull_request.draft == false) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body || '', '@claude') || contains(github.event.issue.title || '', '@claude')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
      checks: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
            checks: read

          # Settings for allowed tools and permissions
          settings: |
            {
              "permissions": {
                "allowedTools": [
                  "Bash(gh:*)",
                  "Bash(npm:*)",
                  "Bash(pnpm:*)",
                  "Bash(npx:*)"
                ]
              }
            }

          # System prompt to automatically create PRs when working on Issues
          claude_args: |
            --system-prompt "When working on GitHub Issues (not PRs), after completing all code changes and pushing to a branch, you MUST create a Pull Request by running 'gh pr create' command. Do not just provide a link - actually execute the gh pr create command to create the PR automatically."
