name: Build and Release DevContainer Image

on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/**'
      - '.claude/commands/**'
      - '.claude/agents/**'
      - '.claude/hooks/**'
      - '.claude/skills/**'
      - '.claude/plugins/**'
      - 'script/**'
      - 'npm/global.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docker-image.yml'
  schedule:
    # Weekly no-cache rebuild: Sunday 00:00 UTC (JST 09:00)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Rebuild the image and registry cache without using existing cache. Skips release creation.'
        required: false
        default: false
        type: boolean
      reason:
        description: 'Optional reason for no-cache rebuild.'
        required: false
      release_mode:
        description: 'auto = semantic-release (default). Select patch/minor/major/custom to force a manual release when needed.'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Custom version used when release_mode=custom (example: 1.2.3)'
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'

      - name: Resolve build mode
        id: build_mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          NO_CACHE_INPUT: ${{ inputs.no_cache || false }}
          REASON_INPUT: ${{ inputs.reason }}
        run: |
          NO_CACHE=false
          REASON=""

          if [ "$EVENT_NAME" = "schedule" ]; then
            NO_CACHE=true
            REASON="Scheduled weekly rebuild"
          elif [ "$NO_CACHE_INPUT" = "true" ]; then
            NO_CACHE=true
            REASON="${REASON_INPUT:-Manual no-cache rebuild}"
          fi

          echo "no_cache=$NO_CACHE" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "Build mode: no_cache=$NO_CACHE"
          if [ -n "$REASON" ]; then
            echo "Reason: $REASON"
          fi

      - name: Determine manual release version
        id: manual_release
        if: steps.build_mode.outputs.no_cache != 'true' && github.event_name == 'workflow_dispatch' && inputs.release_mode != 'auto'
        run: |
          CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${CURRENT_TAG#v}
          MODE="${{ inputs.release_mode }}"
          CUSTOM_VERSION="${{ inputs.custom_version }}"

          bump_version() {
            local mode=$1
            local version=$2
            IFS='.' read -r MAJOR MINOR PATCH <<< "$version"
            case "$mode" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
              *) echo "Unknown release mode: $mode" >&2; exit 1 ;;
            esac
            echo "$MAJOR.$MINOR.$PATCH"
          }

          if [ "$MODE" = "custom" ]; then
            if [ -z "$CUSTOM_VERSION" ]; then
              echo "::error::custom_version is required when release_mode=custom"
              exit 1
            fi
            NEW_VERSION="$CUSTOM_VERSION"
          else
            NEW_VERSION=$(bump_version "$MODE" "$CURRENT_VERSION")
          fi

          echo "Manual release version: $NEW_VERSION (from $CURRENT_TAG)"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "skip_release=false" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release Dry Run
        id: semantic
        if: steps.build_mode.outputs.no_cache != 'true' && (github.event_name != 'workflow_dispatch' || inputs.release_mode == 'auto')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --dry-run --no-ci > semantic-output.txt 2>&1 || true
          cat semantic-output.txt
          NEW_VERSION=$(grep -oP 'The next release version is \K[0-9]+\.[0-9]+\.[0-9]+' semantic-output.txt || echo "")
          if [ -z "$NEW_VERSION" ]; then
            echo "No new release required"
            echo "skip_release=true" >> $GITHUB_OUTPUT
          else
            echo "New version: $NEW_VERSION"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "version_tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "skip_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Resolve release outputs
        id: release
        env:
          NO_CACHE_BUILD: ${{ steps.build_mode.outputs.no_cache }}
          NO_CACHE_REASON: ${{ steps.build_mode.outputs.reason }}
          MANUAL_VERSION: ${{ steps.manual_release.outputs.version }}
          MANUAL_VERSION_TAG: ${{ steps.manual_release.outputs.version_tag }}
          MANUAL_SKIP_RELEASE: ${{ steps.manual_release.outputs.skip_release }}
          SEMANTIC_VERSION: ${{ steps.semantic.outputs.version }}
          SEMANTIC_VERSION_TAG: ${{ steps.semantic.outputs.version_tag }}
          SEMANTIC_SKIP_RELEASE: ${{ steps.semantic.outputs.skip_release }}
        run: |
          if [ "$NO_CACHE_BUILD" = "true" ]; then
            CURRENT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            CURRENT_VERSION=${CURRENT_TAG#v}
            {
              echo "version=$CURRENT_VERSION"
              echo "version_tag=$CURRENT_TAG"
              echo "skip_release=false"
              echo "cache_rebuild=true"
              echo "image_tag=cache-rebuild"
              echo "no_cache=true"
            } >> "$GITHUB_OUTPUT"
            echo "No-cache rebuild requested: ${NO_CACHE_REASON:-no reason provided}"
            exit 0
          fi

          {
            echo "cache_rebuild=false"
            echo "no_cache=false"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$MANUAL_VERSION" ]; then
            {
              echo "version=$MANUAL_VERSION"
              echo "version_tag=$MANUAL_VERSION_TAG"
              echo "skip_release=$MANUAL_SKIP_RELEASE"
              echo "image_tag=$MANUAL_VERSION"
            } >> "$GITHUB_OUTPUT"
          else
            if [ -n "$SEMANTIC_VERSION" ]; then
              {
                echo "version=$SEMANTIC_VERSION"
                echo "version_tag=$SEMANTIC_VERSION_TAG"
                echo "image_tag=$SEMANTIC_VERSION"
              } >> "$GITHUB_OUTPUT"
            fi
            if [ -n "$SEMANTIC_SKIP_RELEASE" ]; then
              echo "skip_release=$SEMANTIC_SKIP_RELEASE" >> "$GITHUB_OUTPUT"
            else
              echo "skip_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Fix workspace permissions
        if: steps.release.outputs.skip_release != 'true'
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - uses: ./.github/actions/setup-docker-build
        if: steps.release.outputs.skip_release != 'true'
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image with cache
        if: steps.release.outputs.skip_release != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/config-base:${{ steps.release.outputs.image_tag }}
            ghcr.io/${{ github.repository_owner }}/config-base:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/config-base:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/config-base:cache,mode=max
          no-cache: ${{ steps.release.outputs.no_cache }}
          build-args: |
            IMAGE_VERSION=${{ steps.release.outputs.version }}
          secrets: |
            claude_credentials=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Export tool versions
        if: steps.release.outputs.skip_release != 'true'
        working-directory: ${{ github.workspace }}
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace ghcr.io/${{ github.repository_owner }}/config-base:latest bash -lc '{ brew --version; terraform --version; jq --version; } > devcontainer-info.txt'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: steps.release.outputs.skip_release != 'true'
        with:
          name: devcontainer-info
          path: devcontainer-info.txt
          retention-days: 7

      - name: Summarize no-cache rebuild
        if: steps.release.outputs.cache_rebuild == 'true'
        env:
          REASON: ${{ steps.build_mode.outputs.reason }}
          OWNER: ${{ github.repository_owner }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          {
            echo "### Docker Cache Rebuild Complete"
            echo ""
            echo "- Trigger: $EVENT_NAME"
            echo "- Reason: ${REASON:-No reason provided}"
            echo "- Platforms: linux/amd64, linux/arm64"
            echo "- Cache updated: ghcr.io/$OWNER/config-base:cache"
            echo "- Image tag updated: ghcr.io/$OWNER/config-base:latest"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Release
        if: steps.release.outputs.skip_release != 'true' && steps.release.outputs.cache_rebuild != 'true' && (github.event_name != 'workflow_dispatch' || inputs.release_mode == 'auto')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release --no-ci

      - name: Create Manual Release
        if: steps.release.outputs.skip_release != 'true' && steps.release.outputs.cache_rebuild != 'true' && github.event_name == 'workflow_dispatch' && inputs.release_mode != 'auto'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          TAG: ${{ steps.release.outputs.version_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            RELEASE_NOTES=$(git log --pretty=format:"- %s" "$PREVIOUS_TAG".."$TAG")
          else
            RELEASE_NOTES="Manual release $TAG"
          fi

          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes "$RELEASE_NOTES" \
            --target main
