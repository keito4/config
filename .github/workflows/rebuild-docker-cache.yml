name: Rebuild Docker Cache (Weekly)

on:
  schedule:
    # 毎週日曜日 0:00 UTC (日本時間 9:00) にフルリビルド
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      reason:
        description: 'リビルドの理由（任意）'
        required: false

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  rebuild-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.node-version'

      - name: Log rebuild reason
        env:
          TRIGGER: ${{ github.event_name }}
          REASON: ${{ inputs.reason }}
        run: |
          echo "=== Docker Cache Full Rebuild ==="
          echo "Trigger: $TRIGGER"
          if [ "$TRIGGER" = "workflow_dispatch" ]; then
            echo "Reason: $REASON"
          else
            echo "Reason: Scheduled weekly rebuild"
          fi
          echo "Date: $(date -u)"

      - name: Fix workspace permissions
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: image=moby/buildkit:latest

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest version tag
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest version: $LATEST_VERSION"

      - name: Build and push with no-cache
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/config-base:cache-rebuild
            ghcr.io/${{ github.repository_owner }}/config-base:latest
          platforms: linux/amd64,linux/arm64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/config-base:cache,mode=max
          no-cache: true
          secrets: |
            claude_credentials=${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Summary
        env:
          TRIGGER: ${{ github.event_name }}
          OWNER: ${{ github.repository_owner }}
        run: |
          {
            echo "### ✅ Docker Cache Rebuild Complete"
            echo ""
            echo "- **Trigger**: $TRIGGER"
            echo "- **Date**: $(date -u)"
            echo "- **Platforms**: linux/amd64, linux/arm64"
            echo "- **Cache Updated**: ghcr.io/$OWNER/config-base:cache"
            echo ""
            echo "次回の通常ビルドからキャッシュが利用可能です 🚀"
          } >> "$GITHUB_STEP_SUMMARY"
