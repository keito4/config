# Diagnostic workflow to isolate ci.yml startup_failure root cause.
# Mirrors ci.yml structurally, one job at a time.
name: CI Debug

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/_ci-debug.yml'

permissions:
  contents: read

jobs:
  hello:
    name: Hello
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - run: echo hello
