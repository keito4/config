name: CI Debug

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/_ci-debug.yml'

permissions:
  contents: read

jobs:
  paths-filter-v3:
    name: Paths Filter v3
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@d1c1ffeae1e93e7e5c2dd4a89c08a73e9d44a7eb # v3.0.3
        id: filter
        with:
          filters: |
            code:
              - '**.js'
