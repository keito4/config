name: Update Claude Plugins

on:
  schedule:
    # 毎週月曜日 UTC 6:00（JST 15:00）に実行
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/local/bin" >> $GITHUB_PATH

      - name: Check for plugin updates
        id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # プラグインリストを読み込み
          PLUGINS_FILE=".claude/plugins/plugins.txt"
          UPDATES=""
          HAS_UPDATES="false"

          # プラグインごとに更新をチェック
          while IFS= read -r line || [[ -n "$line" ]]; do
            # コメントと空行をスキップ
            [[ "$line" =~ ^#.*$ || -z "$line" ]] && continue

            PLUGIN_NAME=$(echo "$line" | cut -d'@' -f1)
            MARKETPLACE=$(echo "$line" | cut -d'@' -f2)

            echo "Checking $PLUGIN_NAME from $MARKETPLACE..."

            # claude plugin list で現在のバージョンを取得（認証なしでも動作する場合）
            # 注: 実際のバージョンチェックは claude CLI の機能に依存

          done < "$PLUGINS_FILE"

          # マーケットプレイスの更新情報を取得
          echo "Checking marketplace updates..."

          # 更新があるかチェック（簡易版）
          # 実際の実装では claude CLI または API を使用
          echo "has_updates=false" >> $GITHUB_OUTPUT
          echo "summary=Plugin update check completed. Manual review recommended." >> $GITHUB_OUTPUT

      - name: Update plugins list
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "Updating plugins.txt with new versions..."
          # 実装: 新しいバージョン情報でファイルを更新

      - name: Create pull request
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: fix/update-claude-plugins
          delete-branch: true
          commit-message: 'fix: update Claude plugins'
          title: 'fix: update Claude plugins'
          body: |
            ## Claude プラグインの更新

            ${{ steps.check.outputs.summary }}

            ### プラグイン一覧

            ```
            $(cat .claude/plugins/plugins.txt | grep -v '^#' | grep -v '^$')
            ```

            ---

            **Auto-generated by:** [update-claude-plugins.yml](.github/workflows/update-claude-plugins.yml)
          labels: dependencies

      - name: Summary
        run: |
          echo "ℹ️ Claude plugin update check completed"
          echo "Current plugins:"
          cat .claude/plugins/plugins.txt | grep -v '^#' | grep -v '^$' || true
