name: Sync Downstream Repositories

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - '.claude/hooks/**'
      - '.claude/rules/**'
      - '.claude/settings.json'
      - '.github/sync-downstream.json'
      - 'script/sync-downstream.js'
      - '.github/workflows/sync-downstream.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report differences without creating PRs'
        type: boolean
        default: false
      repo:
        description: 'Limit to a single repository (owner/name)'
        required: false
        type: string

concurrency:
  group: sync-downstream
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      repos: ${{ steps.matrix.outputs.repos }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build repository matrix from manifest
        id: matrix
        env:
          REPO_FILTER: ${{ inputs.repo }}
        run: |
          repos=$(node --eval '
            const manifest = require("./.github/sync-downstream.json");
            const filter = process.env.REPO_FILTER;
            const names = manifest.repos.map((repo) => repo.name).filter((name) => !filter || name === filter);
            console.log(JSON.stringify(names));
          ')
          echo "repos=$repos" >> "$GITHUB_OUTPUT"

  sync:
    needs: plan
    if: needs.plan.outputs.repos != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.plan.outputs.repos) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.CLAUDE_PAT }}
          path: downstream

      - name: Sync managed files into downstream checkout
        env:
          SYNC_REPO: ${{ matrix.repo }}
          DRY_RUN: ${{ inputs.dry_run == true && '--check' || '' }}
        run: node script/sync-downstream.js --repo "$SYNC_REPO" --target downstream $DRY_RUN

      - name: Create sync pull request
        if: ${{ inputs.dry_run != true }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.CLAUDE_PAT }}
          path: downstream
          branch: chore/config-template-sync
          delete-branch: true
          commit-message: 'chore: keito4/config の管理テンプレートを同期'
          title: 'chore: keito4/config の管理テンプレートを同期'
          body: |
            keito4/config で管理しているテンプレート・`.claude/` アセットの自動同期です。

            - 同期元コミット: keito4/config@${{ github.sha }}
            - 同期対象は [.github/sync-downstream.json](https://github.com/keito4/config/blob/main/.github/sync-downstream.json) で管理されています
            - このリポジトリ固有の変更を維持したい場合は、manifest の `exclude` にパスを追加してください

            ---

            **Auto-generated by:** [sync-downstream.yml](https://github.com/keito4/config/blob/main/.github/workflows/sync-downstream.yml)
