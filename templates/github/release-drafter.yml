# Release Drafter 設定
#
# Conventional Commits のプレフィックスに基づいてリリースノートを自動生成
#
# 使い方:
#   .github/release-drafter.yml にコピーして配置
#
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# バージョン自動判定
version-resolver:
  major:
    labels:
      - 'breaking-change'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'chore'
      - 'dependencies'
  default: patch

# カテゴリ分類
categories:
  - title: '🚀 New Features'
    labels:
      - 'feature'
  - title: '🔧 Improvements'
    labels:
      - 'enhancement'
      - 'performance'
      - 'refactor'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
  - title: '📝 Documentation'
    labels:
      - 'docs'
  - title: '🔒 Security'
    labels:
      - 'security'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
  - title: '🏗️ Infrastructure'
    labels:
      - 'ci'
      - 'infrastructure'
  - title: '🧹 Maintenance'
    labels:
      - 'chore'

# PR ラベル自動付与（タイトルのプレフィックスから）
autolabeler:
  - label: 'feature'
    title:
      - '/^feat/i'
  - label: 'bug'
    title:
      - '/^fix/i'
  - label: 'docs'
    title:
      - '/^docs/i'
  - label: 'chore'
    title:
      - '/^chore/i'
  - label: 'refactor'
    title:
      - '/^refactor/i'
  - label: 'performance'
    title:
      - '/^perf/i'
  - label: 'ci'
    title:
      - '/^ci/i'
  - label: 'dependencies'
    title:
      - '/^deps/i'

# リリースノートのテンプレート
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
