name: Feature Request
description: 新機能や改善を提案する
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        機能提案ありがとうございます。以下の項目をできるだけ詳しく記入してください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: この機能でどんな問題を解決したいですか？
      placeholder: '〜する際に〜が不便で...'
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・改善を希望しますか？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討した方法があれば記述してください
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - '低（あると便利）'
        - '中（業務に影響）'
        - '高（ブロッカー）'
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: モックアップ、参考リンク、関連 Issue など
    validations:
      required: false
