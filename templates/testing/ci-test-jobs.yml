# CI Test Jobs Template
# このファイルは ci.yml に組み込むためのテストジョブ定義です

# =========================================
# Unit Tests & Coverage
# =========================================
unit-tests:
  name: Unit Tests
  runs-on: ubuntu-latest
  needs: quality-gate
  timeout-minutes: 15
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests with coverage
      run: npm test -- --coverage --watchAll=false

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        verbose: true
        fail_ci_if_error: false

    - name: Comment PR with coverage report
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverageSummary = JSON.parse(
            fs.readFileSync('./coverage/coverage-summary.json', 'utf8')
          );
          const total = coverageSummary.total;

          const body = `## Coverage Report

          | Metric | Coverage |
          |--------|----------|
          | Lines | ${total.lines.pct}% |
          | Statements | ${total.statements.pct}% |
          | Functions | ${total.functions.pct}% |
          | Branches | ${total.branches.pct}% |
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

# =========================================
# E2E Tests (Critical Path)
# =========================================
e2e-critical:
  name: E2E Critical Path
  runs-on: ubuntu-latest
  needs: [quality-gate, unit-tests]
  if: github.event_name == 'pull_request'
  timeout-minutes: 20
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Build application
      run: npm run build
      env:
        # Dummy API keys for build
        OPENAI_API_KEY: 'sk-dummy-key-for-ci-build'
        ANTHROPIC_API_KEY: 'sk-ant-dummy-key-for-ci-build'

    - name: Start server and run E2E tests
      run: |
        npm start &
        sleep 10
        npx playwright test --project=chromium tests/e2e/
      env:
        PLAYWRIGHT_BASE_URL: 'http://127.0.0.1:3000'

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report-critical
        path: playwright-report/
        retention-days: 7

# =========================================
# E2E Tests (Full Suite) - main branch only
# =========================================
e2e-full:
  name: E2E Full Suite
  runs-on: ubuntu-latest
  needs: [quality-gate, unit-tests]
  if: github.ref == 'refs/heads/main'
  timeout-minutes: 30
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Build application
      run: npm run build
      env:
        OPENAI_API_KEY: 'sk-dummy-key-for-ci-build'
        ANTHROPIC_API_KEY: 'sk-ant-dummy-key-for-ci-build'

    - name: Start server and run E2E tests
      run: |
        npm start &
        sleep 10
        npx playwright test
      env:
        PLAYWRIGHT_BASE_URL: 'http://127.0.0.1:3000'

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-full
        path: playwright-report/
        retention-days: 14
