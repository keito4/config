# =============================================================================
# pre-commit-config-terraform.yaml
# Terraform プロジェクト向け: base + Terraform lint/fmt + シェル/YAML/Markdown
# 使い方: プロジェクトルートに .pre-commit-config.yaml としてコピー
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # pre-commit-hooks: 汎用の基本チェック
  # https://github.com/pre-commit/pre-commit-hooks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # YAML 構文の検証
      - id: check-yaml
        args: ['--allow-multiple-documents']
      # JSON 構文の検証
      - id: check-json
      # 大容量ファイル（500KB 超）の混入防止
      - id: check-added-large-files
        args: ['--maxkb=500']
      # 末尾の空白文字を除去
      - id: trailing-whitespace
      # ファイル末尾に改行を追加
      - id: end-of-file-fixer
      # マージコンフリクトマーカーの検出
      - id: check-merge-conflict
      # main/master への直接コミットを防止
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']

  # ---------------------------------------------------------------------------
  # gitleaks: シークレット（API キー、トークン等）の漏洩検出
  # https://github.com/gitleaks/gitleaks
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ---------------------------------------------------------------------------
  # pre-commit-terraform: Terraform のフォーマット・検証・ドキュメント生成
  # https://github.com/antonbabenko/pre-commit-terraform
  # ---------------------------------------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      # terraform fmt によるコードフォーマット
      - id: terraform_fmt
      # terraform validate による構文・構成の検証
      - id: terraform_validate
      # terraform-docs によるドキュメント自動生成
      - id: terraform_docs
      # tflint によるベストプラクティスチェック
      - id: terraform_tflint

  # ---------------------------------------------------------------------------
  # shellcheck: シェルスクリプトの静的解析
  # https://github.com/shellcheck-py/shellcheck-py
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # ---------------------------------------------------------------------------
  # markdownlint: Markdown ファイルのリント
  # https://github.com/igorshubovych/markdownlint-cli
  # ---------------------------------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint

  # ---------------------------------------------------------------------------
  # yamllint: YAML ファイルのリント
  # https://github.com/adrienverge/yamllint
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: ['--strict']
