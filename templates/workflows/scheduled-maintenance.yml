name: Scheduled Maintenance

on:
  schedule:
    # Every Monday 06:00 UTC (JST 15:00)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Maintenance mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - check-only

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run scheduled maintenance
        id: maintenance
        uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /repo-maintenance --mode ${{ inputs.mode || 'full' }} --create-pr

            After completing maintenance, create a summary issue comment or issue with:
            - What was checked
            - What was updated (with PR links if any)
            - What needs manual attention

            If no updates are needed, do NOT create an issue.
          settings: |
            {
              "permissions": {
                "allowedTools": [
                  "Bash(gh:*)",
                  "Bash(npm:*)",
                  "Bash(pnpm:*)",
                  "Bash(npx:*)",
                  "Bash(node:*)",
                  "Bash(git:*)",
                  "Bash(curl:*)",
                  "Bash(jq:*)"
                ]
              }
            }

      - name: Post failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --label "maintenance" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Open maintenance issue already exists. Skipping."
            exit 0
          fi

          gh issue create \
            --title "fix: Scheduled Maintenance failed" \
            --label "maintenance,bug" \
            --body "## Scheduled Maintenance Failure

          The scheduled maintenance workflow failed.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Mode:** ${{ inputs.mode || 'full' }}

          Please check the workflow logs and re-run manually if needed.

          ---
          *Auto-generated by [scheduled-maintenance.yml](.github/workflows/scheduled-maintenance.yml)*"
